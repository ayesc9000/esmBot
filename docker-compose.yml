version: '3.0'

services:
  bot:
    build:
      context: .
    image: esmbot
    restart: unless-stopped
    volumes:
      - ${ESM_LOGS}:/app/logs
      - ${ESM_HELP}:/app/help
      - ${ESM_TEMP}:/app/temp
      - ${ESM_CONFIG}:/app/config
    env_file:
      - ${ESM_ENV}
    environment:
      OUTPUT: /app/help/help.md
      TEMPDIR: /app/temp
    user: root
    links:
      - lavalink
    depends_on:
      lavalink:
        condition: service_healthy
      postgres:
        condition: service_healthy

    networks:
      esmbot:
        ipv4_address: 172.20.0.2

  lavalink:
    container_name: lavalink
    image: ghcr.io/lavalink-devs/lavalink:4
    restart: unless-stopped
    volumes:
      - ${LAVA_APP}:/opt/Lavalink/application.yml
      - ${LAVA_PLUGS}:/opt/Lavalink/plugins/
    healthcheck:
        test: "curl -H \"Authorization: $$(cat /opt/Lavalink/application.yml | grep password: | sed 's/^ *password: //g' | tr -d '\"')\" -f http://localhost:2333/version"
        interval: 10s
        timeout: 10s
        retries: 5
        start_period: 10s
    networks:
      esmbot:
        ipv4_address: 172.20.0.3

  postgres:
    container_name: postgres
    image: postgres:13-alpine
    restart: unless-stopped
    volumes:
      - ${PG_DATA}:/var/lib/postgresql/data
    environment:
      POSTGRES_PASSWORD: ${PG_PASS}
      POSTGRES_USER: ${PG_USER}
      POSTGRES_DB: ${PG_DB}
    networks:
      esmbot:
        ipv4_address: 172.20.0.4

networks:
  esmbot:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/24
